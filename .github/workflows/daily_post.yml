
    # 9:00 AM Eastern (UTC-4 in summer / UTC-5 in winter)
    # Using 13:00 UTC which covers EST/EDT across the year
    - cron: '0 10 * * 1-5'   # 5am ET (10:00 UTC), Monday–Friday

  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5        # hard kill if the whole job exceeds 5 minutes

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests pymupdf

      - name: Run post builder
        timeout-minutes: 3    # hard kill if just the script exceeds 3 minutes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COURTLISTENER_API_KEY: ${{ secrets.COURTLISTENER_API_KEY }}
        run: python .github/scripts/build_post.py

      - name: Commit and push updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Add posted_cases.json only if the script created it
          [ -f posted_cases.json ] && git add posted_cases.json || true
          # Only commit if anything actually changed
          git diff --staged --quiet || git commit -m "Auto post: $(date +'%Y-%m-%d')"
          # Pull any remote changes before pushing to avoid rejection
          git pull --rebase origin main
          git push
