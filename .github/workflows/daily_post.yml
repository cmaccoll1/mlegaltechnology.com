name: Daily Securities Litigation Post

on:
  schedule:
    # 9:00 AM Eastern (UTC-4 in summer / UTC-5 in winter)
    # Using 13:00 UTC which covers EST/EDT across the year
    - cron: '0 13 * * 1-4'   # Monday–Thursday

  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the updated index.html

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run post builder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COURTLISTENER_API_KEY: ${{ secrets.COURTLISTENER_API_KEY }}
        run: python .github/scripts/build_post.py

      - name: Commit and push updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if index.html actually changed
          git diff --staged --quiet || git commit -m "Auto post: $(date +'%Y-%m-%d')"
          git push
